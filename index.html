<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>物资选择系统</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
/* 遗留/打卡状态颜色 */
.select-danger {
    color: red !important;
}
/* 动作颜色区分 */
.method-new { color: green; }
.method-remove { color: red; }
.method-replace { color: orange; }
.method-add { color: blue; }
.method-other { color: purple; }
body {
    font-family: Arial;
    padding: 10px;
}

table {
    width: 100%;
    table-layout: fixed;
    border-collapse: collapse;
    border-spacing: 0;
}
/* 底部遗留/打卡与说明行无间隙 */
table:nth-of-type(3) {
    border-collapse: collapse;
    border-spacing: 0;
}
table:nth-of-type(3) td {
    padding-top: 2px;
    padding-bottom: 2px;
}


th:nth-child(1), td:nth-child(1) { width: 60px; }

/* Fixed proportional widths for the second table columns */
table:nth-of-type(2) th:nth-child(1), table:nth-of-type(2) td:nth-child(1) { width: 6%; }
table:nth-of-type(2) th:nth-child(2), table:nth-of-type(2) td:nth-child(2) { width: 10%; }
table:nth-of-type(2) th:nth-child(3), table:nth-of-type(2) td:nth-child(3) { width: 15%; }
table:nth-of-type(2) th:nth-child(4), table:nth-of-type(2) td:nth-child(4) { width: 15%; }
table:nth-of-type(2) th:nth-child(5), table:nth-of-type(2) td:nth-child(5) { width: 15%; }
table:nth-of-type(2) th:nth-child(6), table:nth-of-type(2) td:nth-child(6) { width: 10%; }
table:nth-of-type(2) th:nth-child(7), table:nth-of-type(2) td:nth-child(7) { width: 10%; }
table:nth-of-type(2) th:nth-child(8), table:nth-of-type(2) td:nth-child(8) { width: 8%; }

th, td {
    border: 1px solid #ccc;
    text-align: left;
    padding: 5px;
    word-break: break-all;
}
table:nth-of-type(2) td, table:nth-of-type(2) th {
    text-align: left;
}
table:first-of-type td {
    text-align: left;
}
table:first-of-type td {
    height: 28px;
    vertical-align: middle;
    padding: 2px 4px;
}
table:first-of-type {
    border-collapse: collapse;
}

tr.data-row {
    cursor: move;
}

select, input {
    width: 100%;
    height: 26px;
    box-sizing: border-box;
    font-size: 14px;
    padding: 2px 4px;
}

/* 去掉下拉框默认箭头 */
select {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    background-image: none;
}

/* 默认“请选择”显示为红色 */
select:invalid {
    color: red;
}

/* 数量为空（未填写） */
input.quantity:invalid {
    color: red;
    border: 1px solid red;
}

/* 数量已填写 */
input.quantity:valid {
    color: black;
    border: 1px solid #ccc;
}

/* placeholder 也为红色 */
input.quantity::placeholder {
    color: red;
}

/* 使用为空（未填写） */
input.remark:invalid {
    color: red;
    border: 1px solid red;
}

/* 禁用状态优先级最高（覆盖 invalid 红色） */
input:disabled:invalid,
input:disabled:valid {
    color: #000 !important;
    border: 1px solid #000 !important;
}

/* 使用已填写 */
input.remark:valid {
    color: black;
    border: 1px solid #ccc;
}

/* placeholder 也为红色 */
input.remark::placeholder {
    color: red;
}

/* 禁用输入框的 placeholder 显示为黑色 */
input:disabled::placeholder {
    color: #000 !important;
}

/* 禁用输入框样式：黑色文字、黑色边框 */
input:disabled {
    color: #000 !important;
    border: 1px solid #000 !important;
    background: #f5f5f5;
}

/* 去掉 number 输入框的上下箭头（WebKit） */
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

/* 去掉 number 输入框的上下箭头（Firefox） */
input[type="number"] {
    -moz-appearance: textfield;
}

/* 选中有效值后恢复正常颜色 */
select option {
    color: black;
}

.person {
    width: 80px;
    flex: 0 0 auto;
    height: 26px;
}

.people-actions {
    display: flex;
    flex-direction: row;
    gap: 6px;
    align-items: center;
    margin-left: 8px;
    height: 26px;
}
.people-actions button {
    width: 36px;
    height: 24px;
    font-size: 14px;
    line-height: 24px;
    padding: 0;
}

textarea {
    width: 100%;
    box-sizing: border-box;
    font-size: 14px;
    resize: vertical;
    min-height: 32px;
}
button {
    background-color: #ff4d4f;
    color: #fff;
    border: none;
    padding: 4px 6px;
    font-size: 12px;
    border-radius: 3px;
}
button:hover {
    background-color: #d9363e;
}

h2 {
    font-size: 18px;
}

@media (max-width: 600px) {
    body {
        padding: 5px;
    }

    th, td {
        padding: 3px;
        font-size: 12px;
    }

    select, input {
        height: 28px;
        font-size: 12px;
    }
}
    </style>
</head>
<body>


<input type="file" id="fileInput" />
<button onclick="loadDefaultExcel()">加载默认数据</button>

<br><br>
<table style="margin-bottom:10px; text-align:left;">
    <tbody>
        <tr>
            <td style="width:60px; text-align:left;">区分：</td>
            <td colspan="7">
                <select id="area" style="width:100%;" required>
                    <option value="" disabled selected>请选择</option>
                </select>
            </td>
        </tr>
        <tr>
            <td style="width:60px; text-align:left;">人员：</td>
            <td colspan="7">
                <div style="display:flex; justify-content:space-between; align-items:center; height:26px;">
                    <div id="peopleContainer" style="display:flex; flex-direction:row; flex-wrap:nowrap; gap:5px; width:90%; overflow-x:auto; white-space:nowrap;">
                        <select class="person" required>
                            <option value="" disabled selected>请选择</option>
                        </select>
                        <select class="person" required>
                            <option value="" disabled selected>请选择</option>
                        </select>
                        <select class="person" required>
                            <option value="" disabled selected>请选择</option>
                        </select>
                    </div>
                    <div class="people-actions">
                        <button type="button" onclick="addPerson()">+</button>

        </tr>

        </tr>
        <tr>

                <div style="display:flex; width:100%;">
                    <div style="flex:1; display:flex; align-items:center; padding-left:4px;">

                        <span id="siteA" style="margin-left:4px;"></span>

                    <div style="flex:1; display:flex; align-items:center;">

        <tr>
            <td style="width:60px; text-align:left;">日期：</td>

<input type="date" id="timeInput" style="width:100%; height:26px; font-size:14px;">
            </td>
            <td colspan="4">
                <button onclick="setNowTime()">自动填充当前时间</button>
            </td>
        </tr>
    </tbody>
</table>

<table>
    <thead>
        <tr>
            <th>序号</th>
            <th>动作</th>
            <th>大类</th>
            <th>品牌</th>
            <th>型号</th>
            <th>领取</th>
            <th>现场</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        <tr class="data-row" draggable="true">
            <td class="index"></td>
            <td>
                <select class="method" onchange="updateMethodColor(this)">
                    <option value="新增" selected>新增</option>
                    <option value="拆除">拆除</option>
                    <option value="领取">领取</option>
                    <option value="退库">退库</option>
                </select>
            </td>
            <td>
                <select class="category" required>
                    <option value="" disabled selected>请选择</option>
                </select>
            </td>
            <td>
                <select class="brand" required>
                    <option value="" disabled selected>请选择</option>
                </select>
            </td>
            <td>
                <select class="model" required>
                    <option value="" disabled selected>请选择</option>
                </select>
            </td>

<table style="margin-top:12px; margin-bottom:10px; border-collapse:collapse;">
    <tr>
        <td style="width:80px;">遗留：</td>

            <select id="legacySelect">

            <select id="checkSelect">

                <option value="已打卡">已打卡</option>

        </td>
    </tr>
    <tr id="extraRow">
        <td>说明：</td>

        </td>

</table>
<br><br>
<div style="text-align:center;">
    <button onclick="copySelected()">复制全部内容</button>
</div>

<script>
// 支持下拉手动输入
function enableCustomInput(selectEl) {
    selectEl.addEventListener('change', function () {
        if (this.value === '__custom__') {
            const val = prompt('请输入自定义内容：');
            if (val && val.trim()) {
                // 创建新选项并选中
                const option = document.createElement('option');
                option.value = val.trim();
                option.text = val.trim();
                this.appendChild(option);
                this.value = val.trim();
            } else {
                this.value = '';
            }
        }
    });
}

// 防止人员重复选择
function updatePersonOptions() {
    const selects = document.querySelectorAll('.person');

    const selectedValues = Array.from(selects)
        .map(sel => sel.value)
        .filter(v => v && v !== '__custom__');

    selects.forEach(sel => {
        const currentValue = sel.value;

        // 重新构建选项
        sel.innerHTML = '<option value="">请选择</option>';

        // 手动输入
        const customOption = document.createElement('option');
        customOption.value = '__custom__';
        customOption.text = '手动输入';
        sel.appendChild(customOption);

        peopleList.forEach(p => {
            // 已被其他选中则不显示
            if (selectedValues.includes(p) && p !== currentValue) return;

            const op = document.createElement('option');
            op.value = p;
            op.text = p;
            sel.appendChild(op);
        });

        // 如果当前值是手动输入（不在 peopleList 中），需要补回选项
        if (currentValue && !peopleList.includes(currentValue) && currentValue !== '__custom__') {
            const customCurrent = document.createElement('option');
            customCurrent.value = currentValue;
            customCurrent.text = currentValue;
            sel.appendChild(customCurrent);
        }

        // 还原当前值
        sel.value = currentValue || '';
    });
}
let rawData = [];
let categoryList = [];


document.getElementById('fileInput').addEventListener('change', handleFile);

function loadDefaultExcel() {
    fetch('./物资详细.xlsx')
        .then(res => res.arrayBuffer())
        .then(data => {
            const workbook = XLSX.read(new Uint8Array(data), { type: 'array' });

            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

            rawData = json.slice(1);

            const set = new Set();
            rawData.forEach(r => { if (r[0]) set.add(String(r[0]).trim()); });
            categoryList = Array.from(set);

            window.workbook = workbook;

            initCategory();
            initAreaAndPeople();
            initSiteData();
        })
        .catch(err => {
            alert('默认Excel加载失败，请检查文件路径');
            console.error(err);
        });
}

function handleFile(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function (e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });

        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        // 去掉表头
        rawData = json.slice(1);
        // 预计算大类列表（去重+过滤空值）
        const set = new Set();
        rawData.forEach(r => { if (r[0]) set.add(String(r[0]).trim()); });
        categoryList = Array.from(set);
        window.workbook = workbook; // 保存全局

        initCategory();
        initAreaAndPeople();
        initSiteData();
    };

    reader.readAsArrayBuffer(file);
}

function initCategory() {
    const categorySet = new Set(categoryList);

    const categorySelect = document.querySelector('.data-row .category');
    categorySelect.innerHTML = '';
    const defaultOption = document.createElement('option');
    defaultOption.value = '';
    defaultOption.text = '请选择';
    categorySelect.appendChild(defaultOption);

    // 增加手动输入选项
    const customOption = document.createElement('option');
    customOption.value = '__custom__';
    customOption.text = '手动输入';
    categorySelect.appendChild(customOption);

    categorySet.forEach(item => {
        const option = document.createElement('option');
        option.value = item;
        option.text = item;
        categorySelect.appendChild(option);
    });

    categorySelect.onchange = function(){ updateBrand(this); };
    enableCustomInput(categorySelect);
    updateIndex();
}

function updateBrand(selectEl) {
    const selectedCategory = selectEl.value;

    const row = selectEl.closest('tr'); const brandSelect = row.querySelector('.brand');
    const brandSet = new Set();

    rawData.forEach(rowData => {
        if (rowData[0] === selectedCategory) {
            brandSet.add(rowData[1]);
        }
    });

    brandSelect.innerHTML = '';
    const defaultOption = document.createElement('option');
    defaultOption.value = '';
    defaultOption.text = '请选择';
    brandSelect.appendChild(defaultOption);

    // 增加手动输入选项
    const customOption = document.createElement('option');
    customOption.value = '__custom__';
    customOption.text = '手动输入';
    brandSelect.appendChild(customOption);

    brandSet.forEach(item => {
        const option = document.createElement('option');
        option.value = item;
        option.text = item;
        brandSelect.appendChild(option);
    });

    // 如果只有一个品牌，自动选中
    if (brandSet.size === 1) {
        const only = Array.from(brandSet)[0];
        brandSelect.value = only;
    }

    brandSelect.onchange = function(){ updateModel(this); };
    enableCustomInput(brandSelect);

    updateModel(brandSelect);
}

function updateModel(selectEl) {
    const row = selectEl.closest('tr'); const selectedCategory = row.querySelector('.category').value;
    const selectedBrand = selectEl.value;

    const modelSelect = row.querySelector('.model');
    modelSelect.innerHTML = '';
    const defaultOption = document.createElement('option');
    defaultOption.value = '';
    defaultOption.text = '请选择';
    modelSelect.appendChild(defaultOption);

    // 增加手动输入选项
    const customOption = document.createElement('option');
    customOption.value = '__custom__';
    customOption.text = '手动输入';
    modelSelect.appendChild(customOption);

    // 收集型号列表
    const models = [];
    rawData.forEach(rowData => {
        if (rowData[0] === selectedCategory && rowData[1] === selectedBrand) {
            const option = document.createElement('option');
            option.value = rowData[2];
            option.text = rowData[2];
            modelSelect.appendChild(option);
            models.push(rowData[2]);
        }
    });

    // 如果只有一个型号，自动选中
    if (models.length === 1) {
        modelSelect.value = models[0];
    }

    enableCustomInput(modelSelect);
}

function addRow() {
    if (!rawData || rawData.length === 0) {
        alert('请先选择Excel文件');
        return;
    }
    const tbody = document.querySelectorAll('table')[1].querySelector('tbody');
    // Use querySelector for last row (should be the "插入一条" row)
    const addRowTr = tbody.querySelector('tr:last-child');

    const newRow = document.createElement('tr');
    newRow.className = 'data-row';
    newRow.setAttribute('draggable', 'true');

    newRow.innerHTML = `
        <td class="index"></td>
        <td>
            <select class="method" onchange="updateMethodColor(this)">
                <option value="新增" selected>新增</option>
                <option value="拆除">拆除</option>
                <option value="领取">领取</option>
                <option value="退库">退库</option>
            </select>
        </td>
        <td>
            <select class="category" required>
                <option value="" disabled selected>请选择</option>
            </select>
        </td>
        <td>
            <select class="brand" required>
                <option value="" disabled selected>请选择</option>
            </select>
        </td>
        <td>
            <select class="model" required>
                <option value="" disabled selected>请选择</option>
            </select>
        </td>
        <td><input type="number" class="quantity" placeholder="输入数量" required></td>
        <td><input type="number" class="remark" placeholder="输入使用数量" min="0" step="1" required></td>
        <td><button onclick="deleteRow(this)">删除</button></td>
    `;

    tbody.insertBefore(newRow, addRowTr);
    updateMethodColor(newRow.querySelector('.method'));

    // 初始化该行的大类（使用缓存列表，保证与首行一致）
    const categorySelect = newRow.querySelector('.category');
    categorySelect.innerHTML = '';

    const defaultOption = document.createElement('option');
    defaultOption.value = '';
    defaultOption.text = '请选择';
    categorySelect.appendChild(defaultOption);
    // 增加手动输入选项
    const customOption = document.createElement('option');
    customOption.value = '__custom__';
    customOption.text = '手动输入';
    categorySelect.appendChild(customOption);

    categoryList.forEach(item => {
        const option = document.createElement('option');
        option.value = item;
        option.text = item;
        categorySelect.appendChild(option);
    });

    categorySelect.onchange = function(){ updateBrand(this); };
    enableCustomInput(categorySelect);
    // 初始化为空状态（不自动触发联动）
    const brandSelect = newRow.querySelector('.brand');
    const modelSelect = newRow.querySelector('.model');
    brandSelect.innerHTML = '<option value="">请选择</option>';
    modelSelect.innerHTML = '<option value="">请选择</option>';
    updateIndex();
}

function deleteRow(btn) {
    if (!confirm("确认删除该条吗？")) return;
    if (!confirm("删除后无法恢复，是否继续？")) return;

    const row = btn.closest('tr');
    row.remove();
    updateIndex();
}

function updateIndex() {
    const rows = document.querySelectorAll('table')[1].querySelectorAll('.data-row');
    rows.forEach((row, i) => {
        row.querySelector('.index').innerText = i + 1;
    });
}

let dragSrcEl = null;

document.addEventListener('dragstart', function(e) {
    if (e.target.classList.contains('data-row')) {
        dragSrcEl = e.target;
    }
});

document.addEventListener('dragover', function(e) {
    e.preventDefault();
});

document.addEventListener('drop', function(e) {
    e.preventDefault();
    const target = e.target.closest('.data-row');
    if (dragSrcEl && target && dragSrcEl !== target) {
        const tbody = document.querySelectorAll('table')[1].querySelector('tbody');
        const rows = Array.from(tbody.querySelectorAll('.data-row'));
        const dragIndex = rows.indexOf(dragSrcEl);
        const targetIndex = rows.indexOf(target);

        if (dragIndex < targetIndex) {
            tbody.insertBefore(dragSrcEl, target.nextSibling);
        } else {
            tbody.insertBefore(dragSrcEl, target);
        }
        updateIndex();
    }
});

// 复制功能
function copySelected() {
    const rows = document.querySelectorAll('.data-row');

    if (rows.length === 0) {
        alert('没有可复制的数据');
        return;
    }

    // ===== 全部必填校验 =====
    const area = document.getElementById('area').value;
    const persons = Array.from(document.querySelectorAll('.person'))
        .map(p => p.value)
        .filter(v => v);
    const siteName = document.getElementById('siteName').value;

    // 区分
    if (!area) {
        alert('请填写所有必填项');
        return;
    }
    // 人员（至少一个）
    if (persons.length === 0) {
        alert('请填写所有必填项');
        return;
    }
    // 站名
    if (!siteName) {
        alert('请填写所有必填项');
        return;
    }
    // 表格校验
    for (let row of rows) {
        const method = row.querySelector('.method').value;
        const category = row.querySelector('.category').value;
        const brand = row.querySelector('.brand').value;
        const model = row.querySelector('.model').value;
        const quantityInput = row.querySelector('.quantity');
        const useInput = row.querySelector('.remark');

        const quantity = quantityInput.value;
        const useQty = useInput.value;

        // 仅校验未被禁用的输入框
        if (
            !method ||
            !category ||
            !brand ||
            !model ||
            (!quantityInput.disabled && !quantity) ||
            (!useInput.disabled && !useQty)
        ) {
            alert('请填写所有必填项');
            return;
        }
    }

    let text = '';

    // ===== 顶部信息 =====
    const areaValue = document.getElementById('area').value || '';
    // siteName 已经取过
    let timeInputEl = document.getElementById('timeInput');
    if (!timeInputEl.value) setNowTime();
    const time = timeInputEl.value;

    const selectedSite = siteList.find(s => s.B === siteName);

    // 人员
    const personsArr = Array.from(document.querySelectorAll('.person'))
        .map(p => p.value)
        .filter(v => v);
    const uniquePersons = [...new Set(personsArr)];

    text += `区分：${areaValue}\n`;
    text += `人员：${uniquePersons.join(' ')}\n`;
    text += `站名：${siteName}\n`;

    if (selectedSite) {
        text += `区域：${selectedSite.A}\n`;
        text += `站点编码：${selectedSite.C}\n`;
    }

    text += `施工时间：${time}\n\n`;

    // 表格数据
    rows.forEach(row => {
        const method = row.querySelector('.method').value;
        // const category = row.querySelector('.category').value; // removed from output
        const brand = row.querySelector('.brand').value;
        const model = row.querySelector('.model').value;
        const quantity = row.querySelector('.quantity').value;
        const useQty = row.querySelector('.remark').value || '';

        // 查找单位
        let unit = '';
        const category = row.querySelector('.category').value;
        const found = rawData.find(r =>
            r[0]?.trim() === category &&
            r[1]?.trim() === brand &&
            r[2]?.trim() === model
        );
        if (found && found[3]) {
            unit = found[3];
        }

        // 每一行输出（带序号 "1：" 前缀），不包含category
        const usePart = useQty ? `${useQty}${unit ? ' ' + unit : ''}` : '';
        const index = row.querySelector('.index').innerText || '';
        let lastPart = '';
        if (method === '新增') {
            lastPart = `发货${quantity}${unit || ''}`;
        } else if (method === '领取') {
            lastPart = `${quantity}${unit || ''}`;
        } else {
            lastPart = '';
        }
        let line = `${index}：${method}\t${brand}\t${model}\t${usePart}\t${lastPart}`;
        text += line + '\n';
    });

    // 遗留 / 打卡
    const legacy = document.getElementById('legacySelect').value;
    const check = document.getElementById('checkSelect').value;

    // 校验说明必填（有遗留 或 未打卡）
    if (!(legacy === '无遗留' && check === '已打卡')) {
        const extra = document.getElementById('extraRemark').value;
        if (!extra || !extra.trim()) {
            alert('请填写说明（存在遗留或未打卡）');
            return;
        }
    }

    text += `\n`;

    if (legacy === '有遗留') {
        text += `遗留：${legacy}\n`;
    }

    if (check === '未打卡') {
        text += `打卡：${check}\n`;
    }

    const extra = document.getElementById('extraRemark').value;
    if (extra && extra.trim()) {
        text += `说明：${extra.trim()}\n`;
    }

    navigator.clipboard.writeText(text.trim()).then(() => {
        alert('已复制（优化格式）');
    });
}
function setNowTime() {
    const input = document.getElementById('timeInput');
    const now = new Date();
    const formatted = now.toISOString().slice(0,10);
    input.value = formatted;
}

window.addEventListener('load', function() {
    const input = document.getElementById('timeInput');
    if (!input.value) {
        setNowTime();
    }

    // 自动加载默认Excel
    loadDefaultExcel();
});

let areaList = [];
let peopleList = [];
let siteList = [];

function initAreaAndPeople() {
    const sheet = workbook.Sheets["人员及区域"];
    if (!sheet) return;

    const data = XLSX.utils.sheet_to_json(sheet, { header: 1 }).slice(1);

    const areaSet = new Set();
    const peopleSet = new Set();

    data.forEach(row => {
        if (row[0]) areaSet.add(row[0]);
        if (row[1]) peopleSet.add(row[1]);
    });

    areaList = Array.from(areaSet);
    peopleList = Array.from(peopleSet);

    const areaSelect = document.getElementById('area');
    areaSelect.innerHTML = '<option value="">请选择</option>';
    areaList.forEach(a => {
        const op = document.createElement('option');
        op.value = a;
        op.text = a;
        areaSelect.appendChild(op);
    });

    const selects = document.querySelectorAll('.person');
    selects.forEach(sel => {
        sel.innerHTML = '<option value="">请选择</option>';
        // 增加手动输入选项
        const customOption = document.createElement('option');
        customOption.value = '__custom__';
        customOption.text = '手动输入';
        sel.appendChild(customOption);
        peopleList.forEach(p => {
            const op = document.createElement('option');
            op.value = p;
            op.text = p;
            sel.appendChild(op);
        });
        enableCustomInput(sel);
        sel.onchange = function() {
            updatePersonOptions();
        };
    });
    updatePersonOptions();
}

function initSiteData() {
    const sheet = workbook.Sheets["站点信息"];
    if (!sheet) return;

    const data = XLSX.utils.sheet_to_json(sheet, { header: 1 }).slice(1);

    siteList = data.map(row => ({
        A: row[0],
        B: row[1],
        C: row[2]
    }));

    const input = document.getElementById('siteName');

    const datalist = document.createElement('datalist');
    datalist.id = "siteList";
    document.body.appendChild(datalist);

    datalist.innerHTML = siteList.map(s => `<option value="${s.B}">`).join('');
    input.setAttribute('list', 'siteList');

    input.addEventListener('input', function() {
        const val = this.value;
        const found = siteList.find(s => s.B === val);

        document.getElementById('siteA').innerText = found ? found.A : '';
        document.getElementById('siteC').innerText = found ? found.C : '';
    });
}
function addPerson() {
    const container = document.getElementById('peopleContainer');

    const select = document.createElement('select');
    select.className = 'person';

    select.innerHTML = '<option value="">请选择</option>';
    // 增加手动输入选项
    const customOption = document.createElement('option');
    customOption.value = '__custom__';
    customOption.text = '手动输入';
    select.appendChild(customOption);
    peopleList.forEach(p => {
        const op = document.createElement('option');
        op.value = p;
        op.text = p;
        select.appendChild(op);
    });
    enableCustomInput(select);
    select.onchange = function() {
        updatePersonOptions();
    };
    container.appendChild(select);
    updatePersonOptions();
}

function removePerson() {
    const container = document.getElementById('peopleContainer');
    const selects = container.querySelectorAll('.person');
    if (selects.length <= 1) return;

    container.removeChild(selects[selects.length - 1]);
    updatePersonOptions();
}

    if (e.target.id === 'topRemark') {
        e.target.style.height = 'auto';
        e.target.style.height = e.target.scrollHeight + 'px';
    }
});
</script>
<script>
function toggleExtraInput() {
    const legacy = document.getElementById('legacySelect').value;
    const check = document.getElementById('checkSelect').value;
    const row = document.getElementById('extraRow');

    if (legacy === '无遗留' && check === '已打卡') {
        row.style.display = 'none';
    } else {
        row.style.display = '';
    }
}

function updateStatusColor() {
    const legacyEl = document.getElementById('legacySelect');
    const checkEl = document.getElementById('checkSelect');

    // 清除旧样式
    legacyEl.classList.remove('select-danger');
    checkEl.classList.remove('select-danger');

    // 遗留：有遗留 → 红色
    if (legacyEl.value === '有遗留') {
        legacyEl.classList.add('select-danger');
    }
    // 打卡：未打卡 → 红色
    if (checkEl.value === '未打卡') {
        checkEl.classList.add('select-danger');
    }
}

document.getElementById('legacySelect').onchange = function() {
    toggleExtraInput();
    updateStatusColor();
};
document.getElementById('checkSelect').onchange = function() {
    toggleExtraInput();
    updateStatusColor();
};

window.addEventListener('load', function() {
    toggleExtraInput();
    updateStatusColor();
});
</script>
<script>
function updateMethodColor(select) {
    select.classList.remove('method-new','method-remove','method-replace','method-add','method-other');

    const row = select.closest('tr');
    const quantityInput = row.querySelector('.quantity'); // 领取
    const useInput = row.querySelector('.remark');        // 使用（现场）

    // 先全部恢复
    quantityInput.disabled = false;
    useInput.disabled = false;
    quantityInput.placeholder = '输入数量';
    useInput.placeholder = '输入使用数量';

    switch(select.value) {
        case '新增':
            select.classList.add('method-new');
            break;

        case '拆除':
            select.classList.add('method-remove');
            // 拆除 → 禁用领取
            quantityInput.value = '';
            quantityInput.disabled = true;
            quantityInput.placeholder = '无需';
            break;

        case '领取':
            select.classList.add('method-add');
            // 领取 → 禁用使用（现场）
            useInput.value = '';
            useInput.disabled = true;
            useInput.placeholder = '无需';
            break;

        case '退库':
            select.classList.add('method-other');
            // 退库 → 禁用领取
            quantityInput.value = '';
            quantityInput.disabled = true;
            quantityInput.placeholder = '无需';
            break;

        default:
            select.classList.add('method-other');
    }
}
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.method').forEach(updateMethodColor);
});
</script>
